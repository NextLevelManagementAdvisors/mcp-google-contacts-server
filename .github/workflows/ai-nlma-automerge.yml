name: Auto-merge ai-nlma PRs

# Portable, self-contained auto-merge for claude-hub bot (ai-nlma) PRs.
# Branch protection (and GitHub's native auto-merge) is unavailable on private
# non-Pro repos, so this workflow IS the gate: on a PR opened by ai-nlma it
# detects the stack, runs a build/typecheck gate if one applies, and squash-
# merges when green. Human-authored PRs are never touched (gated on the PR
# author login). Only fires for in-repo branches — fork PRs get a read-only
# token and the merge step would no-op.

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  gate-and-merge:
    if: github.event.pull_request.user.login == 'ai-nlma'
    runs-on: ubuntu-latest
    env:
      # MCP repos pull heavy browser binaries on install — skip them; the gate
      # only needs the code to compile, not to run a browser.
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PATCHRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
      PUPPETEER_SKIP_DOWNLOAD: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      # ---- Node / TypeScript gate (runs only if package.json exists) ----
      - name: Setup Node
        if: hashFiles('package.json') != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Node gate (install + typecheck + build, all best-effort-present)
        if: hashFiles('package.json') != ''
        run: |
          set -e
          if [ -f package-lock.json ]; then npm ci; else npm install --no-audit --no-fund; fi
          npm run typecheck --if-present
          npm run build --if-present

      # ---- Python gate (runs only if no package.json AND python project) ----
      - name: Setup Python
        if: hashFiles('package.json') == '' && (hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '')
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python gate (install + compileall)
        if: hashFiles('package.json') == '' && (hashFiles('requirements.txt') != '' || hashFiles('pyproject.toml') != '')
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e . || true; fi
          python -m compileall -q .

      # ---- Merge (only reached if the gates above passed) ----
      - name: Squash-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" --squash --delete-branch
